<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – KilimoSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f5ee;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .card {
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            background: #fdfaf4;
            border: 1px solid #e5ddcf;
            box-shadow: 0 20px 60px rgba(15,23,42,0.18);
            padding: 24px 24px 28px;
        }
        h1 {
            font-size: 1.5rem;
            margin: 0 0 4px;
            color: #111827;
        }
        p {
            margin: 0;
            font-size: 0.9rem;
            color: #4b5563;
        }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 4px;
        }
        input[type="email"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 999px;
            border: 1px solid #d1d5db;
            font-size: 0.9rem;
            outline: none;
        }
        input[type="email"]:focus {
            border-color: #059669;
            box-shadow: 0 0 0 2px rgba(16,185,129,0.2);
        }
        button {
            margin-top: 14px;
            width: 100%;
            padding: 10px 14px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(90deg,#059669,#22c55e);
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            margin-top: 10px;
            font-size: 0.8rem;
        }
        .message.success { color: #047857; }
        .message.error { color: #b91c1c; }
        .back-link {
            margin-top: 12px;
            font-size: 0.8rem;
            text-align: center;
        }
        .back-link a {
            color: #059669;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Forgot password</h1>
        <p>Enter your email and we’ll send a secure link to reset your password.</p>
        <form id="forgotForm" onsubmit="handleForgot(event)">
            <div style="margin-top:16px;">
                <label for="email">Email address</label>
                <input id="email" name="email" type="email" required autocomplete="email">
            </div>
            <button id="submitBtn" type="submit">Send reset link</button>
            <div id="status" class="message"></div>
        </form>
        <div class="back-link">
            <a href="/login">Back to sign in</a>
        </div>
    </div>
    <script>
        async function handleForgot(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('submitBtn');
            const statusEl = document.getElementById('status');
            statusEl.textContent = '';
            statusEl.className = 'message';

            if (!email) {
                statusEl.textContent = 'Please enter your email.';
                statusEl.classList.add('error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending…';

            try {
                const resp = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await resp.json().catch(() => ({}));
                statusEl.textContent = data.message || 'If that email exists, a reset link has been sent.';
                statusEl.classList.add('success');
            } catch (err) {
                console.error(err);
                statusEl.textContent = 'Something went wrong. Please try again.';
                statusEl.classList.add('error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send reset link';
            }
        }
    </script>
</body>
</html>
